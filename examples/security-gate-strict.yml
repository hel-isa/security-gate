name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  security-gate:
    name: Security Gate
    uses: hel-isa/security-gate/.github/workflows/reusable-security-gate.yml@v2.0.0
    with:
      mode: strict
      semgrep_config: auto
      repo_name: ${{ github.repository }}
      gate_ref: v2.0.0
      deploy_pages: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
