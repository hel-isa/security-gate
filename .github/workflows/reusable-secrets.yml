name: Reusable - Secrets Detection (Gitleaks)

on:
  workflow_call:
    inputs:
      fail_on_findings:
        description: Fail the job when findings are detected
        required: false
        default: true
        type: boolean
      config_path:
        description: Path to gitleaks config file
        required: false
        default: .gitleaks.toml
        type: string

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        run: |
          mkdir -p reports
          set +e
          gitleaks detect --source . --report-format json --report-path reports/gitleaks-report.json --config "${{ inputs.config_path }}"
          EXIT_CODE=$?
          set -e

          if [ ! -f reports/gitleaks-report.json ]; then
            echo '[]' > reports/gitleaks-report.json
          fi

          FINDINGS_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          path = Path('reports/gitleaks-report.json')
          try:
              data = json.loads(path.read_text())
              print(len(data) if isinstance(data, list) else 0)
          except Exception:
              print(0)
          PY
          )
                    echo "findings_count=${FINDINGS_COUNT}" >> "$GITHUB_OUTPUT"
          
                    if [ "${{ inputs.fail_on_findings }}" = "true" ] && [ "$FINDINGS_COUNT" -gt 0 ]; then
                      echo "Gitleaks found ${FINDINGS_COUNT} potential secrets."
                      exit 1
                    fi
          
                    if [ "$EXIT_CODE" -ne 0 ] && [ "$FINDINGS_COUNT" -eq 0 ]; then
                      echo "Gitleaks exited with code $EXIT_CODE but no findings were parsed."
                      exit "$EXIT_CODE"
                    fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.json
          if-no-files-found: error
