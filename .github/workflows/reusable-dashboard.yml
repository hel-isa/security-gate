name: Reusable - Dashboard Aggregation

on:
  workflow_call:
    inputs:
      repo_name:
        description: Repository name override
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download security artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/raw
          pattern: '*-report'
          merge-multiple: true

      - name: Aggregate findings
        run: |
          mkdir -p reports/normalized
          python scripts/aggregate_results.py \
            --input-dir reports/raw \
            --output-file reports/normalized/dashboard-data.json \
            --repo-name "${{ inputs.repo_name }}"

      - name: Build static dashboard package
        run: |
          python scripts/generate_dashboard.py \
            --data-file reports/normalized/dashboard-data.json \
            --dashboard-dir dashboard \
            --output-dir reports/dashboard

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
