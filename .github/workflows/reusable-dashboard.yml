name: Reusable - Dashboard Aggregation

on:
  workflow_call:
    inputs:
      repo_name:
        description: Repository name override
        required: false
        default: ''
        type: string
      deploy_pages:
        description: Deploy dashboard to GitHub Pages
        required: false
        default: false
        type: boolean
      gate_repository:
        description: Repository containing Security Gate scripts and dashboard assets
        required: false
        default: hel-isa/security-gate
        type: string
      gate_ref:
        description: Git ref for Security Gate scripts and dashboard assets
        required: false
        default: v2
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Security Gate assets
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gate_repository }}
          ref: ${{ inputs.gate_ref }}
          path: security-gate

      - name: Download security artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/raw
          pattern: '*-report'
          merge-multiple: true

      - name: Aggregate findings
        run: |
          set -euo pipefail
          mkdir -p reports/normalized
          python security-gate/scripts/aggregate_results.py \
            --input-dir reports/raw \
            --output-file reports/normalized/dashboard-data.json \
            --repo-name "${{ inputs.repo_name || github.repository }}"

      - name: Build static dashboard package
        run: |
          set -euo pipefail
          python security-gate/scripts/generate_dashboard.py \
            --data-file reports/normalized/dashboard-data.json \
            --dashboard-dir security-gate/dashboard \
            --output-dir reports/dashboard

      - name: Verify dashboard output
        run: |
          set -euo pipefail
          test -f reports/dashboard/index.html
          ls -R reports/dashboard

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: reports/dashboard
          if-no-files-found: error

      - name: Upload Pages artifact
        if: inputs.deploy_pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/dashboard

  deploy-pages:
    runs-on: ubuntu-latest
    needs: dashboard
    if: inputs.deploy_pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
