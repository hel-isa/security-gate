name: Security Baseline

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  security-gate:
    name: Security Gate
    uses: ./.github/workflows/reusable-security-gate.yml
    with:
      mode: audit
      semgrep_config: auto
      repo_name: ${{ github.repository }}
      deploy_pages: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
